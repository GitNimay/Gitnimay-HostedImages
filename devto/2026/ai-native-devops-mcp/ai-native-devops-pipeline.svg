<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 z" fill="#64748b"/></marker>
    <style>
      .title{font:700 48px Georgia,serif;fill:#0f172a}.sub{font:400 22px Inter,Arial,sans-serif;fill:#475569}.box{rx:22;filter:url(#shadow);stroke-width:3}.label{font:700 24px Inter,Arial,sans-serif;fill:#0f172a}.small{font:400 18px Inter,Arial,sans-serif;fill:#475569}.edge{stroke:#64748b;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round}.dash{stroke-dasharray:10 10}.note{font:600 20px Inter,Arial,sans-serif;fill:#334155}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1350" cy="120" r="90" fill="#bae6fd" opacity="0.55"/><circle cx="210" cy="760" r="120" fill="#fed7aa" opacity="0.45"/>
  <text x="800" y="80" text-anchor="middle" class="title">AI-native DevOps pipeline</text>
  <text x="800" y="120" text-anchor="middle" class="sub">MCP gives agents tool access. Skills give them safe operating procedures.</text>

  <rect x="70" y="230" width="210" height="105" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="175" y="273" text-anchor="middle" class="label">Pull request</text><text x="175" y="304" text-anchor="middle" class="small">diff + intent</text>
  <rect x="355" y="230" width="210" height="105" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="460" y="273" text-anchor="middle" class="label">CI checks</text><text x="460" y="304" text-anchor="middle" class="small">test · lint · scan</text>
  <rect x="640" y="205" width="245" height="155" class="box" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="762" y="260" text-anchor="middle" class="label">AI DevOps agent</text><text x="762" y="292" text-anchor="middle" class="small">collects context</text><text x="762" y="322" text-anchor="middle" class="small">explains risk</text>
  <rect x="965" y="230" width="210" height="105" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1070" y="273" text-anchor="middle" class="label">MCP tools</text><text x="1070" y="304" text-anchor="middle" class="small">typed access</text>
  <rect x="1250" y="230" width="240" height="105" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1370" y="273" text-anchor="middle" class="label">Safe action</text><text x="1370" y="304" text-anchor="middle" class="small">comment · deploy · rollback</text>

  <path d="M280 282 H355" class="edge"/><path d="M565 282 H640" class="edge"/><path d="M885 282 H965" class="edge"/><path d="M1175 282 H1250" class="edge"/>

  <rect x="400" y="520" width="180" height="85" class="box" fill="#fff7ed" stroke="#fb923c"/>
  <text x="490" y="555" text-anchor="middle" class="label">Skills</text><text x="490" y="582" text-anchor="middle" class="small">runbooks</text>
  <rect x="630" y="500" width="230" height="125" class="box" fill="#fee2e2" stroke="#ef4444"/>
  <text x="745" y="548" text-anchor="middle" class="label">Guardrails</text><text x="745" y="578" text-anchor="middle" class="small">approval · audit</text><text x="745" y="604" text-anchor="middle" class="small">dry-run · policy</text>
  <rect x="920" y="520" width="200" height="85" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="1020" y="555" text-anchor="middle" class="label">GitOps</text><text x="1020" y="582" text-anchor="middle" class="small">Argo CD sync</text>

  <path d="M762 360 V430 C762 470 490 470 490 520" class="edge dash"/>
  <path d="M580 562 H630" class="edge"/><path d="M860 562 H920" class="edge"/>
  <path d="M1020 520 C1020 430 1370 420 1370 335" class="edge dash"/>

  <text x="800" y="790" text-anchor="middle" class="note">The agent speeds up context gathering. The pipeline still owns execution, approvals, and audit history.</text>
</svg>